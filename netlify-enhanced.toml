# Trailing slash normalization (remove trailing slashes)
[[redirects]]
  from = "/:path/"
  to = "/:path"
  status = 301
  force = false

# Catch-all for missing pages
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
